; ═══════════════════════════════════════════════════════════════════════════
; EMS Claims Portal — PgBouncer Configuration
; Connection pooler between app servers and PostgreSQL primary
;
; Install:  apt install pgbouncer  (or run via Docker)
; Config:   /etc/pgbouncer/pgbouncer.ini
; Users:    /etc/pgbouncer/userlist.txt
;
; User list format (userlist.txt):
;   "ems_admin" "md5<hash>"
;   Generate hash:  echo -n "md5$(echo -n '<password>ems_admin' | md5sum | cut -d' ' -f1)"
; ═══════════════════════════════════════════════════════════════════════════

[databases]
; ── Database aliases ─────────────────────────────────────────────────────
; Map incoming connection requests to the actual PostgreSQL backend.
; host=localhost means PgBouncer and PostgreSQL are on the same server.
; For a remote DB server, replace with the private IP.
ems_claims = host=localhost port=5432 dbname=ems_claims

; Read replica (CX32 standby) — for read-heavy queries
; Uncomment and set the standby's private IP when ready:
; ems_claims_ro = host=<STANDBY_PRIVATE_IP> port=5432 dbname=ems_claims


[pgbouncer]
; ── Pooling Mode ─────────────────────────────────────────────────────────
; transaction: connections are returned to the pool after each transaction.
; This is the best mode for web apps — gives the highest connection reuse.
; ⚠️ Do not use session-level features (LISTEN/NOTIFY, prepared statements
;    with extended protocol, temp tables across transactions) with this mode.
pool_mode = transaction

; ── Listen address ───────────────────────────────────────────────────────
; Listen on all interfaces so app servers on the private network can connect.
; UFW restricts port 6432 to the internal network only.
listen_addr = 0.0.0.0
listen_port = 6432

; ── Authentication ───────────────────────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ── Pool sizing ──────────────────────────────────────────────────────────
; max_client_conn:   max simultaneous client connections PgBouncer accepts
;                    (2x app servers × ~50 connections each + headroom)
max_client_conn = 200

; default_pool_size: persistent connections to PostgreSQL PER database/user pair
;                    Keep below max_connections (50) with headroom for admin
default_pool_size = 20

; min_pool_size:     keep at least this many connections warm
min_pool_size = 5

; reserve_pool_size: extra connections for burst traffic
;                    Used when all default_pool_size connections are busy
reserve_pool_size = 5

; reserve_pool_timeout: seconds to wait before using a reserve connection
reserve_pool_timeout = 3

; ── Timeouts ─────────────────────────────────────────────────────────────
; How long a client can be idle before being disconnected
client_idle_timeout = 300

; How long to wait for a server connection from the pool
server_connect_timeout = 15

; Kill server connection if idle for this long
server_idle_timeout = 600

; Max time a client can wait in the login queue
client_login_timeout = 60

; Max lifetime of a server connection (forces reconnect for DNS changes, etc.)
server_lifetime = 3600

; ── Query timeouts ───────────────────────────────────────────────────────
; Kill queries that run longer than 2 minutes (OCR/adjudication tasks
; should use Celery, not synchronous queries)
query_timeout = 120

; Cancel query if server doesn't respond to cancel request in time
query_wait_timeout = 60

; ── Logging ──────────────────────────────────────────────────────────────
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

; Stats collection period (seconds)
stats_period = 60

; ── Admin access ─────────────────────────────────────────────────────────
; pgbouncer admin database — connect with: psql -p 6432 -U pgbouncer pgbouncer
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

; ── TLS (optional — uncomment when certs are available) ──────────────────
; client_tls_sslmode = prefer
; client_tls_cert_file = /etc/pgbouncer/server.crt
; client_tls_key_file = /etc/pgbouncer/server.key
