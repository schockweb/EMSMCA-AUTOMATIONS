# ═══════════════════════════════════════════════════════════════════════════
# EMS Claims Portal — Production Nginx Configuration
# Target: Hetzner Cloud Johannesburg (CX32 app servers)
# Domain: app.example.co.za (placeholder — swap before go-live)
#
# This file is the main server block config.  Mount it into the Nginx
# container at /etc/nginx/conf.d/default.conf.
# ═══════════════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────────────────────────
# Rate Limiting
# ─────────────────────────────────────────────────────────────────────────
# Zone "api" limits each client IP to 100 requests/second with a burst of
# 50 queued.  Requests beyond burst are rejected with 429.
# 10m zone ≈ ~160 000 unique IPs tracked simultaneously.
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

# Login / auth endpoints get a stricter limit to slow brute-force attacks.
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;


# ─────────────────────────────────────────────────────────────────────────
# Upstream — Backend API (Uvicorn behind Docker network)
# ─────────────────────────────────────────────────────────────────────────
upstream ems_backend {
    server ems_backend:8000;

    # For multi-replica setups add more servers here:
    # server ems_backend_2:8000;

    keepalive 32;                       # persistent connections to upstream
}


# ═══════════════════════════════════════════════════════════════════════════
# HTTP → HTTPS redirect
# All plain-HTTP traffic is permanently redirected to HTTPS.
# ═══════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name app.example.co.za;

    # Let's Encrypt ACME challenge must stay over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# ═══════════════════════════════════════════════════════════════════════════
# HTTPS Server Block (primary)
# ═══════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.example.co.za;

    # ── SSL / TLS ────────────────────────────────────────────────────────
    # Certificates managed by Certbot / Let's Encrypt.
    ssl_certificate     /etc/letsencrypt/live/app.example.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.co.za/privkey.pem;

    # Modern TLS only — no SSLv3/TLSv1.0/1.1
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # OCSP Stapling for faster TLS handshakes
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/app.example.co.za/chain.pem;

    # Session cache — avoids re-negotiation for returning clients
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Diffie-Hellman parameter (generate: openssl dhparam -out /etc/ssl/dhparams.pem 2048)
    # ssl_dhparam /etc/ssl/dhparams.pem;

    # ── Security Headers ─────────────────────────────────────────────────
    # Prevent click-jacking: only allow framing from same origin
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Stop MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection (legacy but still useful for older browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # HSTS — tell browsers to always use HTTPS (1 year + subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Referrer policy — don't leak full URLs to third parties
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy — disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy — restrict resource origins
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss://app.example.co.za;" always;


    # ── Gzip Compression ─────────────────────────────────────────────────
    # Compress text-based responses to save bandwidth.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/html
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Client Body ──────────────────────────────────────────────────────
    # 50 MB — needed for PRF scan / document uploads
    client_max_body_size 50M;


    # ─────────────────────────────────────────────────────────────────────
    # Location: /api/ → FastAPI Backend
    # ─────────────────────────────────────────────────────────────────────
    location /api/ {
        # Rate limit: 100 req/s per IP, burst 50 with delay
        limit_req zone=api burst=50 delay=30;
        limit_req_status 429;

        proxy_pass http://ems_backend;

        # Forward client identity to the app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-alive to upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts — OCR / adjudication tasks can take a while
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Location: /api/auth/ → Stricter rate limit for auth endpoints
    # ─────────────────────────────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://ems_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─────────────────────────────────────────────────────────────────────
    # Location: /api/ws → WebSocket support
    # ─────────────────────────────────────────────────────────────────────
    # Real-time updates for claim status, ambulance tracking, etc.
    location /api/ws {
        proxy_pass http://ems_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections can be long-lived
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Location: /docs, /openapi.json → Swagger UI (restrict in production)
    # ─────────────────────────────────────────────────────────────────────
    location /docs {
        # TODO: restrict to internal IPs or disable entirely in production
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://ems_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://ems_backend;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Location: /health → Backend health endpoint (no rate limit)
    # ─────────────────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://ems_backend;
        access_log off;                 # don't spam logs with health checks
    }

    # ─────────────────────────────────────────────────────────────────────
    # Location: / → React SPA (static files)
    # ─────────────────────────────────────────────────────────────────────
    # Serves the Vite-built React app. All unknown paths fall back to
    # index.html so that client-side routing (React Router) works.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (Vite adds content hashes)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ─────────────────────────────────────────────────────────────────────
    # Error pages
    # ─────────────────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
