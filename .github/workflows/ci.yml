# ═══════════════════════════════════════════════════════════════════════════
# EMS Claims Portal — Continuous Integration
# Runs on every push to main and on pull requests.
# Jobs: lint → test-backend → build-images (no push)
# ═══════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # 1. Lint — Python (Ruff) + JavaScript / TypeScript
  # ═══════════════════════════════════════════════════════════════════════
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python linting with Ruff ──
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python lint tools
        run: pip install ruff

      - name: Ruff check (backend)
        run: ruff check backend/app/ --output-format=github

      # ── JavaScript / TypeScript linting ──
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --no-audit

      - name: TypeScript type-check
        run: |
          cd frontend
          npx tsc --noEmit

      # ESLint — only runs if an ESLint config exists
      - name: ESLint (if configured)
        run: |
          cd frontend
          if [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.json ] || [ -f eslint.config.js ] || [ -f eslint.config.mjs ]; then
            npx eslint src/ --max-warnings=0 || true
          else
            echo "ℹ️  No ESLint config found — skipping"
          fi

  # ═══════════════════════════════════════════════════════════════════════
  # 2. Backend Tests — pytest with a real PostgreSQL 16 service
  # ═══════════════════════════════════════════════════════════════════════
  test-backend:
    name: "Backend Tests"
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_ems
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # App-level env vars consumed by backend/app/config.py
      DATABASE_URL: "postgresql+asyncpg://test_user:test_pass@localhost:5432/test_ems"
      SECRET_KEY: "test-secret"
      ENCRYPTION_KEY: "test-encrypt-key-32chars0000000"
      CELERY_BROKER_URL: "memory://"
      APP_ENV: "development"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U test_user; do
            echo "⏳ Waiting for Postgres..."
            sleep 2
          done

      - name: Run pytest
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short -x

  # ═══════════════════════════════════════════════════════════════════════
  # 3. Build Docker Images (verify they build — no push)
  # ═══════════════════════════════════════════════════════════════════════
  build-images:
    name: "Build Docker Images"
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build backend image — verify Dockerfile is valid
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          target: production
          tags: ems-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build frontend image — verify Dockerfile is valid
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          target: production
          tags: ems-frontend:ci-${{ github.sha }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
