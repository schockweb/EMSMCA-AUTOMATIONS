# ═══════════════════════════════════════════════════════════
# Nginx Reverse Proxy — Routes traffic to frontend & backend
# Place at project root: nginx/nginx.conf
# ═══════════════════════════════════════════════════════════

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS in production
    # Uncomment when SSL is configured:
    # return 301 https://$host$request_uri;

    include /etc/nginx/conf.d/security-headers.conf;

    # ── API routes → Backend ──
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long OCR/adjudication operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # File upload limit (PRF scans)
        client_max_body_size 50M;
    }

    # ── Swagger docs → Backend ──
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend;
    }

    # ── Health check → Backend ──
    location /health {
        proxy_pass http://backend;
    }

    # ── Everything else → Frontend ──
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

