# ═══════════════════════════════════════════════════════════
# PostgreSQL 16 — Production Configuration
# Target: Hetzner CX42 (8 vCPU, 16 GB RAM, SSD)
# ═══════════════════════════════════════════════════════════
# Generated for EMS Claims Portal workload:
# - Mixed OLTP (claims CRUD) + batch (adjudication, reports)
# - ~100 concurrent connections via PgBouncer
# - Moderate write volume, heavy read queries
# ═══════════════════════════════════════════════════════════

# ── Connection Settings ───────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200

# ── Memory ────────────────────────────────────────────────
shared_buffers = '4GB'                 # 25% of 16GB RAM
effective_cache_size = '12GB'          # 75% of RAM
work_mem = '32MB'                      # Per-sort/hash operation
maintenance_work_mem = '512MB'         # VACUUM, CREATE INDEX
huge_pages = try

# ── WAL & Checkpoints ────────────────────────────────────
wal_level = replica                    # Required for streaming replication
max_wal_senders = 5                    # Standby + pg_basebackup slots
wal_keep_size = '1GB'
max_wal_size = '2GB'
min_wal_size = '512MB'
checkpoint_completion_target = 0.9
wal_compression = zstd

# ── Replication ───────────────────────────────────────────
hot_standby = on
max_replication_slots = 5
synchronous_commit = on                # Change to 'remote_apply' for sync standby

# ── Query Planner ─────────────────────────────────────────
random_page_cost = 1.1                 # SSD storage
effective_io_concurrency = 200         # SSD parallelism
default_statistics_target = 200

# ── Parallel Queries ─────────────────────────────────────
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4
parallel_leader_participation = on

# ── Logging ───────────────────────────────────────────────
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = '1d'
log_rotation_size = '100MB'
log_min_duration_statement = 500       # Log slow queries (>500ms)
log_checkpoints = on
log_connections = off                  # PgBouncer handles many connects
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_line_prefix = '%m [%p] %q%u@%d '

# ── Autovacuum ────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = '30s'
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.025

# ── Security ─────────────────────────────────────────────
ssl = off                              # SSL terminated at PgBouncer/network level
password_encryption = 'scram-sha-256'

# ── Timezone ──────────────────────────────────────────────
timezone = 'Africa/Johannesburg'
lc_messages = 'en_US.UTF-8'
