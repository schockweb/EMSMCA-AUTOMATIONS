services:

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ems_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ems_rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbit_secure_2024}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ems_backend
    restart: unless-stopped
    env_file:
      - .env
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres.pssxfjbstlznijbjgfdo:MichaelSchuttler924@aws-0-eu-west-1.pooler.supabase.com:5432/postgres?ssl=require
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-ems_rabbit}:${RABBITMQ_PASS:-rabbit_secure_2024}@rabbitmq:5672//
      - UPLOAD_DIR=/app/uploads
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ems_celery_worker
    restart: unless-stopped
    env_file:
      - .env
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres.pssxfjbstlznijbjgfdo:MichaelSchuttler924@aws-0-eu-west-1.pooler.supabase.com:5432/postgres?ssl=require
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-ems_rabbit}:${RABBITMQ_PASS:-rabbit_secure_2024}@rabbitmq:5672//
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      disable: true
    command: celery -A app.tasks.celery_app worker --loglevel=info --pool=solo

  frontend:
    image: node:20-alpine
    container_name: ems_frontend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  rabbitmq_data:
  upload_data:
